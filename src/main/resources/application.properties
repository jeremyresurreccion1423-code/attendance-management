spring.config.import=optional:classpath:application-local.properties

spring.application.name=Attendance Management System

# Supabase PostgreSQL (override in application-local.properties or env vars)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Session Pooler optimized)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=AttendanceSessionPool

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Manila

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.attendance=INFO

# Thymeleaf
spring.thymeleaf.cache=true

# Server
server.port=8081

# Session
server.servlet.session.timeout=30m

# Super Admin cross-system SSO shared secret (set the SAME value on the Library app; override via env var in prod)
super-admin.sso-secret=${SUPER_ADMIN_SSO_SECRET:dev-only-change-me}

# Base URL of the Library Management System app (used by the Super Admin dashboard cross-links)
attendance.library-app-url=${LIBRARY_APP_URL:http://localhost:8080}

# Geo-location validation radius (meters)
attendance.geo.radius=100

# Hours after class schedule start before unmarked students are auto-marked absent (QR sessions)
attendance.qr.grace-hours=1
# Mail (OTP for forgot password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
