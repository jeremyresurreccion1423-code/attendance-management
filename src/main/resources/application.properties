spring.config.import=optional:classpath:application-local.properties

spring.application.name=Attendance Management System

# Supabase PostgreSQL (override in application-local.properties or env vars)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase Session Pooler (PgBouncer) — disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.properties.hibernate.jdbc.use_server_prep_stmts=false

# Connection pool (Session Pooler — keep small; Library app shares the same Supabase limit)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=AttendanceSessionPool

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Manila
spring.jpa.open-in-view=false

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

spring.web.resources.cache.cachecontrol.max-age=86400

# Logging
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN
logging.level.com.attendance=INFO

# Thymeleaf
spring.thymeleaf.cache=true

# Startup: skip demo seed checks on Railway after first deploy (set ATTENDANCE_SEED_ON_STARTUP=true to re-enable)
attendance.seed-on-startup=${ATTENDANCE_SEED_ON_STARTUP:false}

# Server (Railway sets PORT automatically)
server.port=${PORT:8081}

# Session
server.servlet.session.timeout=30m

# Geo-location validation radius (meters)
attendance.geo.radius=100

# Hours after class schedule start before unmarked students are auto-marked absent (QR sessions)
attendance.qr.grace-hours=1

# Mail (OTP for forgot password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
