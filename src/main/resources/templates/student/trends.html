<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance Trends - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=7)}">
</head>
<body>
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Student Portal</small></div>
        <nav>
            <a href="/student/dashboard">Dashboard</a>
            <a href="/student/attendance">Attendance</a>
            <a href="/student/scan">QR Attendance</a>
            <a href="/student/grades">Grades</a>
            <a href="/student/schedule">Schedule</a>
            <a href="/student/trends" class="active">Trends</a>
            <a href="/logout" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Attendance Trends</h1>
                <span th:text="'Your analytics, ' + ${student.fullName}"></span>
            </div>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a th:href="@{/logout}" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" th:text="${data.attendancePercentage} + '%'">0%</div>
                <div class="label">Overall Attendance</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${data.attendanceStats.present}">0</div>
                <div class="label">Present</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${data.attendanceStats.absent}">0</div>
                <div class="label">Absent</div>
            </div>
        </div>

        <div class="card">
            <h3>Weekly Attendance Trend</h3>
            <div class="trends-page-chart"><canvas id="weeklyTrendChart"></canvas></div>
        </div>

        <div class="card">
            <h3>Monthly Attendance Trend</h3>
            <div class="trends-page-chart"><canvas id="monthlyTrendChart"></canvas></div>
        </div>

        <div class="card" th:if="${!#lists.isEmpty(data.grades)}">
            <h3>Student Performance Chart</h3>
            <div class="trends-page-chart"><canvas id="performanceChart"></canvas></div>
        </div>
    </main>
</div>
<script th:src="@{/js/vendor/chart.umd.min.js}"></script>
<script th:src="@{/js/dashboard-charts.js(v=2)}"></script>
<script th:src="@{/js/profile-menu.js}"></script>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/layout.js}"></script>
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function () {
    DashboardCharts.renderAttendanceTrend('weeklyTrendChart', /*[[${data.dailyTrendChart}]]*/ {});
    DashboardCharts.renderAttendanceTrend('monthlyTrendChart', /*[[${data.monthlyTrendChart}]]*/ {});
    DashboardCharts.renderPerformanceBar('performanceChart', /*[[${data.performanceChart}]]*/ {});
});
</script>
</body>
</html>
