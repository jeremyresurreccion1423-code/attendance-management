<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Control Center - Super Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=7)}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-brand-blob auth-brand-blob-1"></div>
            <div class="auth-brand-blob auth-brand-blob-2"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-logo-ring">
                    <img th:src="@{/images/edupresence-logo.png}" alt="EduPresence System logo">
                </div>
            </div>
            <ul class="auth-brand-points">
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </span>
                    <span>Attendance Management System</span>
                </li>
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </span>
                    <span>Library Management System</span>
                </li>
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </span>
                    <span>One console. Full oversight.</span>
                </li>
            </ul>
        </div>

        <div class="auth-form">
            <div class="auth-form-head">
                <div>
                    <h1>System <span>Control Center</span></h1>
                    <p>Super Admin access only<br>Centralized administration hub</p>
                </div>
                <span class="auth-shield" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4"></path>
                    </svg>
                </span>
            </div>

            <div class="auth-divider"></div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <form th:action="@{/super-admin/login}" method="post" class="ams-validate auth-fields">
                <div class="form-group">
                    <label for="username">Super Admin Username</label>
                    <div class="auth-input">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" class="form-control" required autofocus minlength="3" placeholder="superadmin">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="auth-input">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" class="form-control" required minlength="6" placeholder="••••••••">
                        <button type="button" class="auth-input-toggle" aria-label="Show password" onclick="togglePasswordVisibility(this)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary auth-submit">ENTER CONTROL CENTER</button>
            </form>

            <p class="auth-footer-text">Not a Super Admin? <a th:href="@{/login}">Go to the regular login</a></p>
        </div>
    </div>
</div>
<script th:src="@{/js/forms.js}"></script>
<script>
    function togglePasswordVisibility(btn) {
        var input = btn.parentElement.querySelector('input');
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.classList.toggle('is-visible');
    }
</script>
</body>
</html>
