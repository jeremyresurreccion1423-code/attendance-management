<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduPresence System</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=8)}">
</head>
<body data-auth-page="true">
<div class="auth-page">
    <div class="auth-card" style="max-width: 920px;">
        <div class="auth-brand">
            <div class="auth-brand-blob auth-brand-blob-1"></div>
            <div class="auth-brand-blob auth-brand-blob-2"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-logo-ring">
                    <img th:src="@{/images/edupresence-logo.png}" alt="EduPresence System logo">
                </div>
            </div>
            <ul class="auth-brand-points">
                <li><span>Secure password reset</span></li>
                <li><span>OTP sent to your Gmail</span></li>
                <li><span>Works for forgot &amp; change password</span></li>
            </ul>
        </div>

        <div class="auth-form">
            <div class="auth-form-head">
                <div>
                    <h1>Reset Password</h1>
                    <p>One OTP flow for forgot password and change password.</p>
                </div>
            </div>

            <div class="auth-divider"></div>

            <div th:if="${message}" class="alert alert-success" role="status" aria-live="polite" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-error" role="alert" aria-live="polite" th:text="${error}"></div>

            <div style="margin-bottom:1.25rem;">
                <h3 style="margin:0 0 0.65rem; font-size:1rem;">Step 1: Send OTP to Gmail</h3>
                <form th:action="@{/forgot-password/request-otp}" method="post" class="ams-validate auth-fields">
                    <div class="form-group">
                        <label for="otp-username">Username or Email</label>
                        <input type="text" id="otp-username" name="username" class="form-control"
                               th:value="${otpUsername}" required
                               th:readonly="${otpLocked}"
                               placeholder="Your username or school email">
                    </div>
                    <button type="submit" class="btn btn-primary auth-submit">Send OTP</button>
                </form>
            </div>

            <div>
                <h3 style="margin:0 0 0.65rem; font-size:1rem;">Step 2: Verify OTP &amp; Set New Password</h3>
                <form th:action="@{/forgot-password}" method="post" class="ams-validate auth-fields">
                    <input type="hidden" name="username"
                           th:if="${otpUsername != null and !#strings.isEmpty(otpUsername)}"
                           th:value="${otpUsername}">
                    <div class="form-group" th:if="${otpUsername == null or #strings.isEmpty(otpUsername)}">
                        <label>Username or Email</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="otp-code">OTP Code</label>
                        <input type="text" id="otp-code" name="otp" class="form-control" required maxlength="6" minlength="6"
                               inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code">
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="newPassword" class="form-control" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirmPassword" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary auth-submit">Verify OTP &amp; Save Password</button>
                </form>
            </div>

            <p class="auth-footer-text" style="margin-top:1.25rem;">
                <a th:href="${backUrl}" th:text="${backLabel}">Back to Login</a>
            </p>
        </div>
    </div>
</div>
<script th:src="@{/js/forms.js}"></script>
</body>
</html>
