<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <h1>Reset Password</h1>
        <p class="subtitle">Request OTP first, then verify to reset password.</p>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card" style="margin-bottom:1rem;">
            <h3>Step 1: Send OTP to Gmail</h3>
            <form th:action="@{/forgot-password/request-otp}" method="post" class="ams-validate">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" th:value="${otpUsername}" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Send OTP</button>
            </form>
        </div>

        <div class="card">
            <h3>Step 2: Verify OTP and Set New Password</h3>
            <form th:action="@{/forgot-password}" method="post" class="ams-validate">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" th:value="${otpUsername}" required>
            </div>
            <div class="form-group">
                <label>OTP Code</label>
                <input type="text" name="otp" class="form-control" required maxlength="6" minlength="6">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword" class="form-control" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Verify OTP &amp; Reset Password</button>
            </form>
        </div>
        <p style="text-align:center; margin-top:1rem;"><a th:href="@{/login}">Back to Login</a></p>
    </div>
</div>
<script th:src="@{/js/forms.js}"></script>
</body>
</html>
