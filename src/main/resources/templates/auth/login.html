<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduPresence System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body data-auth-page="true">
<div class="auth-page">
    <div class="auth-card">
        <!-- Brand / hero side -->
        <div class="auth-brand">
            <div class="auth-brand-blob auth-brand-blob-1"></div>
            <div class="auth-brand-blob auth-brand-blob-2"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-logo-ring">
                    <img th:src="@{/images/edupresence-logo.png}" alt="EduPresence System logo">
                </div>
            </div>
            <ul class="auth-brand-points">
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </span>
                    <span>Track Attendance.</span>
                </li>
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </span>
                    <span>Build Accountability.</span>
                </li>
                <li>
                    <span class="auth-brand-point-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                            <polyline points="17 6 23 6 23 12"></polyline>
                        </svg>
                    </span>
                    <span>Empower Success.</span>
                </li>
            </ul>
        </div>

        <!-- Form side -->
        <div class="auth-form">
            <div class="auth-form-head">
                <div>
                    <h1>Welcome to <span>EduPresence</span></h1>
                    <p>Attendance Management System<br>Laguna University</p>
                </div>
                <span class="auth-shield" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4"></path>
                    </svg>
                </span>
            </div>

            <div class="auth-divider"></div>

            <div th:if="${error}" class="alert alert-error" role="alert" aria-live="polite" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" role="status" aria-live="polite" th:text="${message}"></div>

            <form th:action="@{/login}" method="post" class="ams-validate auth-fields">
                <div class="form-group">
                    <label for="username">Username or ID Number</label>
                    <div class="auth-input">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" class="form-control" required autofocus minlength="3" placeholder="241-3231">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="auth-input">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" class="form-control" required minlength="6" placeholder="••••••••">
                        <button type="button" class="auth-input-toggle" aria-label="Show password" onclick="togglePasswordVisibility(this)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="auth-row">
                    <label class="auth-remember">
                        <input type="checkbox" name="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a th:href="@{/forgot-password}" class="auth-forgot">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-submit">LOGIN</button>
            </form>

            <p class="auth-footer-text">Don't have an account? <a th:href="@{/forgot-password}">Contact Administrator</a></p>

            <a th:href="@{/super-admin/login}" class="auth-super-admin-link">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                Super Admin? Sign in via the System Control Center
            </a>
        </div>
    </div>
</div>
<script th:src="@{/js/forms.js}"></script>
<script>
    function togglePasswordVisibility(btn) {
        var input = btn.parentElement.querySelector('input');
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.classList.toggle('is-visible');
    }
</script>
</body>
</html>
