<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sections - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=16)}">
</head>
<body th:class="${#authorization.expression('hasRole(''SUPER_ADMIN'')')} ? 'super-admin-theme' : 'admin-theme'">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-sections')}"></div>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:replace="~{fragments/admin-header :: header('Section Management', 'Organize class sections and year levels.', 'Sections')}"></div>

        <div th:if="${selectedDepartmentId == null}">
            <div class="card">
                <h3>Select Department</h3>
                <div class="course-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="d : ${departmentList}" th:href="@{|/admin/sections?departmentId=${d.id}|}" class="course-card">
                        <h4 th:text="${d.name}"></h4>
                        <p>Click to view sections</p>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null and (selectedYearLevel == null or selectedYearLevel.isEmpty())}">
            <div class="card">
                <h3>Select Year Level - <span th:text="${selectedDepartmentName}"></span></h3>
                <a th:href="@{|/admin/sections|}" class="btn btn-secondary" style="margin-bottom: 1rem; display: inline-block;">← Back to Departments</a>
                <div class="year-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="yl : ${yearLevels}"
                       th:href="@{/admin/sections(departmentId=${selectedDepartmentId}, yearLevel=${yl})}"
                       class="year-card"><h4 th:text="${yl}"></h4></a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null and selectedYearLevel != null and !selectedYearLevel.isEmpty()}">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Sections - <span th:text="${selectedDepartmentName}"></span> - <span th:text="${selectedYearLevel}"></span></h3>
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}|}" class="btn btn-secondary">← Back to Year Levels</a>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Sections <small id="sectionCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <input type="search" id="sectionSearchInput" class="form-control" placeholder="Search sections...">
                    <select id="sectionPageSize" class="form-control"><option value="10">10</option><option value="25">25</option></select>
                </div>
                <table id="sectionsTable">
                    <thead><tr><th data-sort="name">Name</th><th data-sort="department">Department</th><th data-sort="year">Year Level</th><th>Action</th></tr></thead>
                    <tbody>
                        <th:block th:each="s : ${sections}">
                        <tr data-admin-row th:attr="data-search=${#strings.toLowerCase(s.name + ' ' + (s.department != null ? s.department.name : '') + ' ' + s.yearLevel)}, data-name=${s.name}, data-department=${s.department != null ? s.department.name : ''}, data-year=${s.yearLevel}">
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.department != null ? s.department.name : '-'}"></td>
                            <td th:text="${s.yearLevel}"></td>
                            <td>
                                <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Edit</button>
                                <form th:action="@{|/admin/sections/${s.id}/delete|}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete section ' + ${s.name} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${s.id}" style="display:none; background:#f8faf8;">
                            <td colspan="4">
                                <form th:action="@{|/admin/sections/${s.id}/update|}" method="post" class="ams-validate" data-lookup-form>
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <div class="form-row">
                                        <div class="form-group"><label>Section Name</label><input type="text" name="name" class="form-control" th:value="${s.name}" required></div>
                                        <div class="form-group"><label>Department</label>
                                            <select name="department.id" class="form-control" data-lookup-role="department" required th:attr="data-selected=${s.department != null ? s.department.id : selectedDepartmentId}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Year Level</label>
                                            <select name="yearLevel" class="form-control" data-lookup-role="year-level" required th:attr="data-selected=${s.yearLevel}">
                                                <option value="">-- Select department first --</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                    <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(sections)}">
                            <td colspan="4" style="text-align:center; color:#666;">No sections yet for this department and year level.</td>
                        </tr>
                    </tbody>
                </table>
                <div id="sectionPagination" class="admin-pagination"></div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/lookup-filter.js(v=2)}"></script>
<script th:src="@{/js/admin-list.js(v=1)}"></script>
<script th:src="@{/js/layout.js}"></script>
<script>
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
function toggleEdit(id) {
    const row = document.getElementById('edit-row-' + id);
    if (!row) return;
    const opening = row.style.display === 'none';
    row.style.display = opening ? 'table-row' : 'none';
    if (opening && window.adminLookups) {
        const form = row.querySelector('form[data-lookup-form]');
        if (form) window.adminLookups.bindForm(form);
    }
}
document.addEventListener('DOMContentLoaded', () => {
    initAdminTable(document.getElementById('sectionsTable'), {
        searchInput: document.getElementById('sectionSearchInput'),
        pageSizeSelect: document.getElementById('sectionPageSize'),
        paginationEl: document.getElementById('sectionPagination'),
        countEl: document.getElementById('sectionCountLabel'),
    });
});
</script>
</body>
</html>
