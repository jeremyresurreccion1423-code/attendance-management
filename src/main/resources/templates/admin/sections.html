<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sections - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=7)}">
</head>
<body>
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-sections')}"></div>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div class="page-header">
            <h1>Section Management</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a th:href="@{/logout}" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId == null}">
            <div class="card">
                <h3>Select Department</h3>
                <div class="course-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="d : ${departmentList}" th:href="@{|/admin/sections?departmentId=${d.id}|}" class="course-card">
                        <h4 th:text="${d.name}"></h4>
                        <p>Click to view sections</p>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null and (selectedYearLevel == null or selectedYearLevel.isEmpty())}">
            <div class="card">
                <h3>Select Year Level - <span th:text="${selectedDepartmentName}"></span></h3>
                <a th:href="@{|/admin/sections|}" class="btn btn-secondary" style="margin-bottom: 1rem; display: inline-block;">← Back to Departments</a>
                <div class="year-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}&yearLevel=1st Year|}" class="year-card"><h4>1st Year</h4></a>
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}&yearLevel=2nd Year|}" class="year-card"><h4>2nd Year</h4></a>
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}&yearLevel=3rd Year|}" class="year-card"><h4>3rd Year</h4></a>
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}&yearLevel=4th Year|}" class="year-card"><h4>4th Year</h4></a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null and selectedYearLevel != null and !selectedYearLevel.isEmpty()}">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Sections - <span th:text="${selectedDepartmentName}"></span> - <span th:text="${selectedYearLevel}"></span></h3>
                    <a th:href="@{|/admin/sections?departmentId=${selectedDepartmentId}|}" class="btn btn-secondary">← Back to Year Levels</a>
                </div>
            </div>

            <div class="card">
                <h3>All Sections</h3>
                <table>
                    <thead><tr><th>Name</th><th>Department</th><th>Year Level</th></tr></thead>
                    <tbody>
                        <tr th:each="s : ${sections}">
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.department != null ? s.department.name : '-'}"></td>
                            <td th:text="${s.yearLevel}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sections)}">
                            <td colspan="3" style="text-align:center; color:#666;">No sections yet for this department and year level.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script>
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
</script>
</body>
</html>
