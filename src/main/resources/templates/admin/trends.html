<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Attendance Trends - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=17)}">
</head>
<body th:class="${#authorization.expression('hasRole(''SUPER_ADMIN'')')} ? 'super-admin-theme' : 'admin-theme'">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-trends')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/admin-header :: header('Attendance Trends', 'Weekly and monthly attendance analytics.', 'Trends')}"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" th:text="${data.todayAttendance}">0</div>
                <div class="label">Today's Records</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${data.weeklyAttendance}">0</div>
                <div class="label">Weekly Records</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${data.monthlyAttendance}">0</div>
                <div class="label">Monthly Records</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${data.totalStudents}">0</div>
                <div class="label">Total Students</div>
            </div>
        </div>

        <div class="card">
            <h3>Weekly Attendance Trend</h3>
            <div class="trends-page-chart"><canvas id="weeklyTrendChart"></canvas></div>
        </div>

        <div class="card">
            <h3>Monthly Attendance Trend</h3>
            <div class="trends-page-chart"><canvas id="monthlyTrendChart"></canvas></div>
        </div>

        <div class="card" th:if="${!#lists.isEmpty(data.lowAttendanceAlerts)}">
            <h3>Low Attendance Alerts (&lt; 75%)</h3>
            <table>
                <thead><tr><th>Student No.</th><th>Name</th><th>Attendance %</th></tr></thead>
                <tbody>
                    <tr th:each="alert : ${data.lowAttendanceAlerts}">
                        <td th:text="${alert.studentNumber}"></td>
                        <td th:text="${alert.studentName}"></td>
                        <td th:text="${alert.percentage} + '%'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/vendor/chart.umd.min.js}"></script>
<script th:src="@{/js/dashboard-charts.js(v=5)}"></script>
<script th:src="@{/js/profile-menu.js}"></script>
<script th:src="@{/js/layout.js}"></script>
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function () {
    DashboardCharts.renderAttendanceTrend('weeklyTrendChart', /*[[${data.dailyTrendChart}]]*/ {});
    DashboardCharts.renderAttendanceTrend('monthlyTrendChart', /*[[${data.monthlyTrendChart}]]*/ {});
});
</script>
</body>
</html>
