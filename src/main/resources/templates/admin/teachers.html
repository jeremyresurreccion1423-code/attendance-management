<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Teachers - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=7)}">
</head>
<body>
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-teachers')}"></div>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div class="page-header">
            <h1>Teacher Management</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a th:href="@{/logout}" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId == null}">
            <div class="card">
                <h3>Select Department</h3>
                <div class="department-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="d : ${departmentList}" th:href="@{|/admin/teachers?departmentId=${d.id}|}" class="course-card">
                        <h4 th:text="${d.name}"></h4>
                        <p>Click to view teachers</p>
                    </a>
                    <div th:if="${#lists.isEmpty(departmentList)}" style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #666;">
                        <p>No departments found. <a th:href="@{|/admin/create#department|}">Create a department</a> first.</p>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null}">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Teachers - <span th:text="${selectedDepartmentName}"></span></h3>
                    <a th:href="@{|/admin/teachers|}" class="btn btn-secondary">← Back to Departments</a>
                </div>
            </div>

            <div class="card">
                <form method="get" th:action="@{|/admin/teachers|}" class="student-search-bar">
                    <input type="hidden" name="departmentId" th:value="${selectedDepartmentId}">
                    <input type="search" name="search" class="form-control" th:value="${searchQuery}" placeholder="Search teachers..." id="teacherSearchInput">
                    <select name="status" class="form-control" id="teacherStatusFilter">
                        <option value="">All Status</option>
                        <option value="ACTIVE" th:selected="${statusFilter == 'ACTIVE'}">ACTIVE</option>
                        <option value="INACTIVE" th:selected="${statusFilter == 'INACTIVE'}">INACTIVE</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Apply</button>
                </form>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Teachers <small id="teacherCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <select id="teacherPageSize" class="form-control"><option value="10">10</option><option value="25">25</option><option value="50">50</option></select>
                </div>
                <table id="teachersTable">
                    <thead>
                        <tr>
                            <th data-sort="employee-id">Employee ID</th>
                            <th data-sort="name">Name</th>
                            <th data-sort="department">Department</th>
                            <th data-sort="email">Email</th>
                            <th data-sort="status">Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="t : ${teachers}">
                        <tr data-admin-row
                            th:attr="data-status=${t.status}, data-search=${#strings.toLowerCase(t.fullName + ' ' + t.employeeId + ' ' + (t.email != null ? t.email : ''))}, data-employee-id=${t.employeeId}, data-name=${t.fullName}, data-department=${t.department != null ? t.department.name : ''}, data-email=${t.email}">
                            <td th:text="${t.employeeId}"></td>
                            <td th:text="${t.fullName}"></td>
                            <td th:text="${t.department != null ? t.department.name : '-'}"></td>
                            <td th:text="${t.email}"></td>
                            <td th:text="${t.status}"></td>
                            <td>
                                <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${t.id} + ')'">Edit</button>
                                <form th:action="@{|/admin/teachers/${t.id}/delete|}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete teacher ' + ${t.fullName} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${t.id}" style="display:none; background:#f8faf8;">
                            <td colspan="6">
                                <form th:action="@{|/admin/teachers/${t.id}/update|}" method="post" class="ams-validate" data-lookup-form>
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <div class="form-row">
                                        <div class="form-group"><label>Name</label><input type="text" name="fullName" class="form-control" th:value="${t.fullName}" required></div>
                                        <div class="form-group"><label>Department</label>
                                            <select name="department.id" class="form-control" data-lookup-role="department" required th:attr="data-selected=${t.department != null ? t.department.id : ''}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Contact</label><input type="text" name="contactNumber" class="form-control" th:value="${t.contactNumber}" inputmode="numeric" pattern="[0-9]*"></div>
                                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" th:value="${t.email}" required></div>
                                        <div class="form-group"><label>Status</label>
                                            <select name="status" class="form-control">
                                                <option value="ACTIVE" th:selected="${t.status != null and t.status.name() == 'ACTIVE'}">ACTIVE</option>
                                                <option value="INACTIVE" th:selected="${t.status != null and t.status.name() == 'INACTIVE'}">INACTIVE</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                    <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${t.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(teachers)}">
                            <td colspan="6" style="text-align:center; color:#666;">No teachers yet for this department.</td>
                        </tr>
                    </tbody>
                </table>
                <div id="teacherPagination" class="admin-pagination"></div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/lookup-filter.js(v=2)}"></script>
<script th:src="@{/js/admin-list.js(v=1)}"></script>
<script th:src="@{/js/layout.js}"></script>
<script>
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
function toggleEdit(id) {
    const row = document.getElementById('edit-row-' + id);
    if (!row) return;
    const opening = row.style.display === 'none';
    row.style.display = opening ? 'table-row' : 'none';
    if (opening && window.adminLookups) {
        const form = row.querySelector('form[data-lookup-form]');
        if (form) window.adminLookups.bindForm(form);
    }
}
document.addEventListener('DOMContentLoaded', () => {
    initAdminTable(document.getElementById('teachersTable'), {
        searchInput: document.getElementById('teacherSearchInput'),
        statusFilter: document.getElementById('teacherStatusFilter'),
        pageSizeSelect: document.getElementById('teacherPageSize'),
        paginationEl: document.getElementById('teacherPagination'),
        countEl: document.getElementById('teacherCountLabel'),
    });
});
</script>
</body>
</html>
