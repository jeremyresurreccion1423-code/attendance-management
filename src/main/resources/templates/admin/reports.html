<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Reports - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=17)}">
</head>
<body th:class="${#authorization.expression('hasRole(''SUPER_ADMIN'')')} ? 'super-admin-theme' : 'admin-theme'">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-reports')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/admin-header :: header('Reports', 'Generate and export attendance reports.', 'Reports Overview')}"></div>

        <div class="card">
            <h3>Attendance Report</h3>
            <form class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" class="form-control" th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" class="form-control" th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                </div>
            </form>
            <a href="#" onclick="exportReport('excel')" class="btn btn-primary">Export Excel</a>
            <a href="#" onclick="exportReport('pdf')" class="btn btn-secondary" style="margin-left:0.5rem;">Export PDF</a>
        </div>

        <div class="card">
            <h3>Student Report</h3>
            <a th:href="@{|/admin/reports/students/pdf|}" class="btn btn-primary">Export Student List (PDF)</a>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script th:inline="javascript">
function exportReport(type) {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const base = /*[[@{|/admin/reports/attendance/|}]]*/ '/admin/reports/attendance/';
    window.location = base + type + '?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end);
}
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
</script>
</body>
</html>
