<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Subjects - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=19)}">
</head>
<body class="admin-theme">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-subjects')}"></div>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <th:block th:replace="~{fragments/admin-header :: header('Subject Management', 'Manage subjects across departments.', 'Subjects')}"></th:block>

        <div th:if="${selectedDepartmentId == null}">
            <div class="card">
                <h3>Select Department</h3>
                <div class="department-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="d : ${departmentList}" th:href="@{|/admin/subjects?departmentId=${d.id}|}" class="course-card">
                        <h4 th:text="${d.name}"></h4>
                        <p>Click to view subjects</p>
                    </a>
                    <div th:if="${#lists.isEmpty(departmentList)}" style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #666;">
                        <p>No departments found. <a th:href="@{|/admin/create#department|}">Create a department</a> first.</p>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null}">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Subjects - <span th:text="${selectedDepartmentName}"></span></h3>
                    <a th:href="@{|/admin/subjects|}" class="btn btn-secondary">← Back to Departments</a>
                </div>
            </div>

            <div class="card">
                <form method="get" th:action="@{|/admin/subjects|}" class="student-search-bar">
                    <input type="hidden" name="departmentId" th:value="${selectedDepartmentId}">
                    <input type="search" name="search" class="form-control" th:value="${searchQuery}" placeholder="Search subjects..." id="subjectSearchInput">
                    <button type="submit" class="btn btn-primary">Apply</button>
                </form>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Subjects <small id="subjectCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <label class="admin-page-size" style="display:flex; align-items:center; gap:0.5rem; margin:0; font-size:0.9rem; color:#64748b;">
                        Per page
                        <select id="subjectPageSize" class="form-control" style="width:auto; min-width:5rem;">
                            <option value="9999" selected>All</option>
                            <option value="10">10</option>
                            <option value="25">25</option>
                        </select>
                    </label>
                </div>
                <table id="subjectsTable">
                    <thead>
                        <tr>
                            <th data-sort="code">Code</th>
                            <th data-sort="name">Name</th>
                            <th data-sort="teacher">Teacher</th>
                            <th data-sort="section">Section</th>
                            <th>Assign Students</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="sub : ${subjects}">
                        <tr data-admin-row
                            th:attr="data-search=${#strings.toLowerCase(sub.subjectCode + ' ' + sub.subjectName + ' ' + (sub.teacher != null ? sub.teacher.fullName : '') + ' ' + (sub.section != null ? sub.section.name : ''))}, data-code=${sub.subjectCode}, data-name=${sub.subjectName}, data-teacher=${sub.teacher != null ? sub.teacher.fullName : ''}, data-section=${sub.section != null ? sub.section.name : ''}">
                            <td th:text="${sub.subjectCode}"></td>
                            <td th:text="${sub.subjectName}"></td>
                            <td th:text="${sub.teacher != null ? sub.teacher.fullName : '-'}"></td>
                            <td th:text="${sub.section != null ? sub.section.name : '-'}"></td>
                            <td>
                                <form th:action="@{|/admin/subjects/${sub.id}/assign-students|}" method="post" class="assign-students-widget" data-assign-widget>
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="search" class="form-control assign-search" placeholder="Search student..." data-assign-search>
                                    <div class="assign-students-list" data-assign-list
                                         th:with="enrolledIds=${enrolledStudentIdsBySubject != null ? enrolledStudentIdsBySubject[sub.id] : null}">
                                        <label class="assign-student-item" th:each="st : ${students}"
                                               th:classappend="${enrolledIds != null and enrolledIds.contains(st.id)} ? ' is-enrolled' : ''"
                                               th:attr="data-search-text=${#strings.toLowerCase(st.fullName + ' ' + st.studentNumber + ' ' + (st.section != null ? st.section.name : ''))}">
                                            <input type="checkbox" name="studentIds" th:value="${st.id}" data-assign-checkbox
                                                   th:checked="${enrolledIds != null and enrolledIds.contains(st.id)}"
                                                   th:disabled="${enrolledIds != null and enrolledIds.contains(st.id)}">
                                            <span>
                                                <th:block th:text="${st.fullName + ' (' + st.studentNumber + ')' + (st.section != null ? ' — ' + st.section.name : '')}">Student</th:block>
                                                <small th:if="${enrolledIds != null and enrolledIds.contains(st.id)}" class="assign-enrolled-tag">Enrolled</small>
                                            </span>
                                        </label>
                                        <div class="assign-empty" data-assign-empty hidden>No students in this department.</div>
                                    </div>
                                    <div class="assign-students-actions">
                                        <small class="assign-selected-count" data-assign-count>0 selected</small>
                                        <div class="assign-students-tools">
                                            <button type="button" class="btn btn-sm btn-secondary" data-assign-select-all>Select All</button>
                                            <button type="button" class="btn btn-sm btn-secondary" data-assign-clear>Clear</button>
                                            <button type="submit" class="btn btn-sm btn-primary">Assign</button>
                                        </div>
                                    </div>
                                </form>
                            </td>
                            <td>
                                <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${sub.id} + ')'">Edit</button>
                                <form th:action="@{|/admin/subjects/${sub.id}/delete|}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete subject ' + ${sub.subjectCode} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${sub.id}" style="display:none; background:#f8faf8;">
                            <td colspan="6">
                                <form th:action="@{|/admin/subjects/${sub.id}/update|}" method="post" class="ams-validate" data-lookup-form>
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <select name="department.id" data-lookup-role="department" hidden>
                                        <option th:value="${selectedDepartmentId}" selected></option>
                                    </select>
                                    <div class="form-row">
                                        <div class="form-group"><label>Subject Name</label><input type="text" name="subjectName" class="form-control" th:value="${sub.subjectName}" required></div>
                                        <div class="form-group"><label>Teacher</label>
                                            <select name="teacher.id" class="form-control" data-lookup-role="teacher" required th:attr="data-selected=${sub.teacher != null ? sub.teacher.id : ''}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Section</label>
                                            <select name="section.id" class="form-control" data-lookup-role="section" required th:attr="data-selected=${sub.section != null ? sub.section.id : ''}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                    <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${sub.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(subjects)}">
                            <td colspan="5" style="text-align:center; color:#666;">No subjects yet for this department.</td>
                        </tr>
                    </tbody>
                </table>
                <div id="subjectPagination" class="admin-pagination"></div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/lookup-filter.js(v=2)}"></script>
<script th:src="@{/js/admin-list.js(v=2)}"></script>
<script th:src="@{/js/layout.js}"></script>
<script>
function toggleEdit(id) {
    const row = document.getElementById('edit-row-' + id);
    if (!row) return;
    const opening = row.style.display === 'none';
    row.style.display = opening ? 'table-row' : 'none';
    if (opening && window.adminLookups) {
        const form = row.querySelector('form[data-lookup-form]');
        if (form) {
            window.adminLookups.bindForm(form);
            const teacherSelect = form.querySelector('[data-lookup-role="teacher"]');
            const sectionSelect = form.querySelector('[data-lookup-role="section"]');
            const teacherId = teacherSelect?.getAttribute('data-selected');
            const sectionId = sectionSelect?.getAttribute('data-selected');
            window.adminLookups.refreshFormLookups(form).then(() => {
                if (teacherId && teacherSelect) teacherSelect.value = teacherId;
                if (sectionId && sectionSelect) sectionSelect.value = sectionId;
            }).catch(console.error);
        }
    }
}
document.addEventListener('DOMContentLoaded', () => {
    initAdminTable(document.getElementById('subjectsTable'), {
        searchInput: document.getElementById('subjectSearchInput'),
        pageSizeSelect: document.getElementById('subjectPageSize'),
        paginationEl: document.getElementById('subjectPagination'),
        countEl: document.getElementById('subjectCountLabel'),
        defaultPageSize: 9999,
    });
});
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});

function bindAssignWidget(widget) {
    const searchInput = widget.querySelector('[data-assign-search]');
    const items = Array.from(widget.querySelectorAll('.assign-student-item'));
    const checkboxes = Array.from(widget.querySelectorAll('[data-assign-checkbox]'));
    const countEl = widget.querySelector('[data-assign-count]');
    const emptyEl = widget.querySelector('[data-assign-empty]');
    const selectAllBtn = widget.querySelector('[data-assign-select-all]');
    const clearBtn = widget.querySelector('[data-assign-clear]');

    function updateCount() {
        const selected = checkboxes.filter(cb => cb.checked && !cb.disabled).length;
        const enrolled = checkboxes.filter(cb => cb.disabled && cb.checked).length;
        if (countEl) {
            countEl.textContent = enrolled > 0
                ? `${selected} selected · ${enrolled} enrolled`
                : `${selected} selected`;
        }
    }

    function applySearch() {
        const query = (searchInput?.value || '').trim().toLowerCase();
        let visibleCount = 0;
        items.forEach((item) => {
            const text = item.getAttribute('data-search-text') || '';
            const visible = !query || text.includes(query);
            item.hidden = !visible;
            if (visible) visibleCount += 1;
        });
        if (emptyEl) {
            emptyEl.hidden = visibleCount > 0;
            emptyEl.textContent = items.length === 0
                ? 'No students in this department.'
                : 'No students match your search.';
        }
    }

    if (searchInput) {
        searchInput.addEventListener('input', applySearch);
    }
    checkboxes.forEach((cb) => cb.addEventListener('change', updateCount));
    if (selectAllBtn) {
        selectAllBtn.addEventListener('click', () => {
            items.forEach((item) => {
                if (item.hidden) return;
                const checkbox = item.querySelector('[data-assign-checkbox]');
                if (checkbox) checkbox.checked = true;
            });
            updateCount();
        });
    }
    if (clearBtn) {
        clearBtn.addEventListener('click', () => {
            checkboxes.forEach((cb) => {
                if (!cb.disabled) cb.checked = false;
            });
            updateCount();
        });
    }
    widget.addEventListener('submit', (event) => {
        const selected = checkboxes.filter(cb => cb.checked && !cb.disabled).length;
        if (selected === 0) {
            event.preventDefault();
            if (window.amsConfirm) {
                window.amsConfirm("Pumili ng kahit isang bagong student bago mag-assign.", {
                    title: "No Student Selected",
                    okText: "OK",
                    cancelText: "Close"
                });
            }
        }
    });

    applySearch();
    updateCount();
}

document.querySelectorAll('[data-assign-widget]').forEach(bindAssignWidget);
</script>
</body>
</html>
