<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Departments - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=15)}">
</head>
<body th:class="${#authorization.expression('hasRole(''SUPER_ADMIN'')')} ? 'super-admin-theme' : 'admin-theme'">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('ams-departments')}"></div>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="page-header">
            <div>
                <h1>Department Management</h1>
                <span>Create, edit, and view department details</span>
                <div style="margin-top:0.65rem;">
                    <a th:href="@{|/admin/create#department|}" class="btn btn-primary">Create Department</a>
                </div>
            </div>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a th:href="@{/logout}" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div class="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem;">
            <div class="card stat-card">
                <small>Total Departments</small>
                <strong th:text="${#lists.size(departments)}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Teachers</small>
                <strong th:text="${totalTeachers}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Students</small>
                <strong th:text="${totalStudents}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Sections</small>
                <strong th:text="${totalSections}">0</strong>
            </div>
        </div>

        <div class="card">
            <h3>All Departments</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Teachers</th>
                        <th>Sections</th>
                        <th>Students</th>
                        <th>Subjects</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="d : ${departments}">
                    <tr>
                        <td th:text="${d.name}"></td>
                        <td th:text="${d.description != null ? d.description : '-'}"></td>
                        <td th:text="${d.teacherCount}"></td>
                        <td th:text="${d.sectionCount}"></td>
                        <td th:text="${d.studentCount}"></td>
                        <td th:text="${d.subjectCount}"></td>
                        <td>
                            <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${d.id} + ')'">Edit</button>
                            <form th:action="@{|/admin/departments/${d.id}/delete|}" method="post" style="display:inline;" class="confirm-delete"
                                  th:attr="data-confirm-message='Delete department ' + ${d.name} + '? This is only allowed when no records are linked.'">
                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:id="'edit-row-' + ${d.id}" style="display:none; background:#f8faf8;">
                        <td colspan="7">
                            <form th:action="@{|/admin/departments/${d.id}/update|}" method="post" class="ams-validate">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Name</label>
                                        <input type="text" name="name" class="form-control" th:value="${d.name}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Description</label>
                                        <input type="text" name="description" class="form-control" th:value="${d.description}">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${d.id} + ')'">Cancel</button>
                            </form>
                        </td>
                    </tr>
                    </th:block>
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="7" style="text-align:center; color:#666;">No departments yet. <a th:href="@{|/admin/create#department|}">Create one</a>.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/layout.js}"></script>
<script>
function toggleEdit(id) {
    const row = document.getElementById('edit-row-' + id);
    if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
</script>
</body>
</html>
