<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="chrome">

  <header class="sa-header-bar">
    <div class="sa-header-bar-left">
      <button type="button" class="sa-header-bar-toggle" onclick="saToggleSidebar()" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <a th:href="@{/superadmin/attendance/dashboard}" class="sa-header-bar-brand">
        <i class="bi bi-shield-lock"></i>
        <span>
          EDULIBRARY
          <small class="sa-header-bar-brand-sub">Attendance Control Center</small>
        </span>
      </a>
    </div>
    <div class="sa-header-bar-right">
      <div class="sa-profile-widget">
        <button type="button" class="sa-profile-trigger" onclick="saToggleProfileMenu(this)" aria-haspopup="true" aria-label="My Profile">
          <span class="sa-profile-trigger-avatar">
            <span class="sa-profile-trigger-initial" sec:authentication="name">SA</span>
          </span>
          <i class="bi bi-chevron-down sa-profile-caret"></i>
        </button>
        <div class="sa-profile-menu" role="menu">
          <a th:href="${libraryControlCenterUrl}" class="sa-profile-menu-action" role="menuitem">
            <span class="sa-profile-menu-icon"><i class="bi bi-grid-1x2"></i></span>
            <span class="sa-profile-menu-text">
              <span class="sa-profile-menu-label">System Control Center</span>
              <span class="sa-profile-menu-hint">Return to executive dashboard</span>
            </span>
          </a>
          <div class="sa-profile-menu-divider"></div>
          <form th:action="@{/super-admin/logout}" method="post" class="m-0">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="sa-profile-menu-action sa-profile-logout" role="menuitem">
              <span class="sa-profile-menu-icon sa-profile-menu-icon-danger"><i class="bi bi-box-arrow-right"></i></span>
              <span class="sa-profile-menu-text"><span class="sa-profile-menu-label">Logout</span></span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </header>

  <aside class="sa-sidebar" id="saSidebar" aria-label="Super Admin attendance navigation">
    <div class="sa-sidebar-portal-label">
      <i class="bi bi-stars"></i>
      <span>Executive Portal</span>
    </div>
    <div class="sa-sidebar-header">
      <a th:href="@{/superadmin/attendance/dashboard}" class="sa-sidebar-brand">
        <i class="bi bi-calendar2-check"></i>
        <span>Attendance Module</span>
      </a>
    </div>
    <div class="sa-sidebar-scroll">
      <nav class="sa-sidebar-nav">
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/dashboard}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/dashboard')} ? ' active'">
          <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/departments}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/departments')} ? ' active'">
          <i class="bi bi-building"></i><span>Departments</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/create}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/create')} ? ' active'">
          <i class="bi bi-plus-circle"></i><span>Create / Add</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/students}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/students')} ? ' active'">
          <i class="bi bi-mortarboard"></i><span>Students</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/teachers}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/teachers')} ? ' active'">
          <i class="bi bi-person-check"></i><span>Teachers</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/subjects}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/subjects')} ? ' active'">
          <i class="bi bi-book-half"></i><span>Subjects</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/sections}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/sections')} ? ' active'">
          <i class="bi bi-layers"></i><span>Sections</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/reports}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/reports')} ? ' active'">
          <i class="bi bi-file-earmark-bar-graph"></i><span>Reports</span>
        </a>
        <a class="sa-sidebar-link" th:href="@{/superadmin/attendance/trends}"
           th:classappend="${navUri != null and navUri.startsWith('/superadmin/attendance/trends')} ? ' active'">
          <i class="bi bi-graph-up-arrow"></i><span>Trends</span>
        </a>

        <div class="sa-sidebar-divider"></div>
        <p class="sa-sidebar-section-label">System</p>
        <a class="sa-sidebar-link" th:href="${libraryControlCenterUrl}">
          <i class="bi bi-arrow-left-circle"></i><span>Library Control Center</span>
        </a>
      </nav>
    </div>
  </aside>

</th:block>
</body>
</html>
