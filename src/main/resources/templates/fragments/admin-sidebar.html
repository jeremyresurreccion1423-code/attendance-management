<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="sidebar(activePage)">
    <aside class="sidebar" sec:authorize="hasRole('ADMIN')">
        <div class="brand"><h2>AMS</h2><small>Admin Panel</small></div>
        <div class="sidebar-nav-scroll">
            <nav>
                <a th:href="@{/admin/dashboard}" th:classappend="${activePage == 'ams-dashboard'} ? 'active' : ''">Dashboard</a>
                <a th:href="@{/admin/departments}" th:classappend="${activePage == 'ams-departments'} ? 'active' : ''">Departments</a>
                <a th:href="@{/admin/create}" th:classappend="${activePage == 'ams-create'} ? 'active' : ''">Create Dashboard</a>
                <a th:href="@{/admin/students}" th:classappend="${activePage == 'ams-students'} ? 'active' : ''">Students</a>
                <a th:href="@{/admin/teachers}" th:classappend="${activePage == 'ams-teachers'} ? 'active' : ''">Teachers</a>
                <a th:href="@{/admin/subjects}" th:classappend="${activePage == 'ams-subjects'} ? 'active' : ''">Subjects</a>
                <a th:href="@{/admin/sections}" th:classappend="${activePage == 'ams-sections'} ? 'active' : ''">Sections</a>
                <a th:href="@{/admin/reports}" th:classappend="${activePage == 'ams-reports'} ? 'active' : ''">Reports</a>
                <a th:href="@{/admin/trends}" th:classappend="${activePage == 'ams-trends'} ? 'active' : ''">Trends</a>
                <a th:href="@{/admin/admins}" th:classappend="${activePage == 'ams-admins'} ? 'active' : ''">Admins</a>
            </nav>
        </div>
    </aside>
</th:block>
</body>
</html>
