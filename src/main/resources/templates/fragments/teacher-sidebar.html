<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebar(activePage)">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Teacher Panel</small></div>
        <nav>
            <a th:href="@{/teacher/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">Dashboard</a>
            <a th:href="@{/teacher/subjects}" th:classappend="${activePage == 'subjects'} ? 'active' : ''">Subjects</a>
            <a th:href="@{/teacher/attendance}" th:classappend="${activePage == 'attendance'} ? 'active' : ''">Attendance</a>
            <a th:href="@{/teacher/marks}" th:classappend="${activePage == 'marks'} ? 'active' : ''">Marks</a>
            <a th:href="@{/teacher/timetable}" th:classappend="${activePage == 'timetable'} ? 'active' : ''">Timetable</a>
            <a th:href="@{/teacher/reports}" th:classappend="${activePage == 'reports'} ? 'active' : ''">Reports</a>
            <a th:href="@{/teacher/trends}" th:classappend="${activePage == 'trends'} ? 'active' : ''">Trends</a>
            <a th:href="@{/logout}" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
</th:block>
</body>
</html>
