<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="sa-topbar" th:fragment="navbar(title, subtitle)">
  <div class="sa-topbar__left">
    <button type="button" class="sa-topbar__toggle" onclick="saToggleSidebar()" aria-label="Toggle menu">
      <i data-lucide="menu"></i>
    </button>
    <div class="sa-topbar__titles">
      <h1 class="sa-topbar__title" th:text="${title}">Dashboard</h1>
      <p class="sa-topbar__subtitle" th:if="${subtitle != null}" th:text="${subtitle}">Overview</p>
    </div>
  </div>
  <div class="sa-topbar__right">
    <div class="sa-navbar-profile">
      <button type="button" class="sa-navbar-profile__trigger" onclick="saToggleProfileMenu(this)" aria-haspopup="true" aria-label="My Profile">
        <span class="sa-navbar-profile__avatar">
          <img th:if="${profilePhotoUrl != null}" th:src="${profilePhotoUrl}" alt="Profile photo"/>
          <span th:unless="${profilePhotoUrl != null}" th:text="${profileInitial ?: 'SA'}">SA</span>
        </span>
        <span class="sa-navbar-profile__meta">
          <strong sec:authentication="name">Super Admin</strong>
          <small>Super Admin</small>
        </span>
        <i data-lucide="chevron-down" class="sa-navbar-profile__caret"></i>
      </button>
      <div class="sa-navbar-profile__menu" role="menu">
        <a th:href="${libraryControlCenterUrl}" class="sa-navbar-profile__item" role="menuitem">
          <i data-lucide="layout-grid"></i>
          <span>
            <strong>Control Center</strong>
            <small>Return to Library portal</small>
          </span>
        </a>
        <div class="sa-navbar-profile__divider"></div>
        <form th:action="@{/super-admin/logout}" method="post" class="m-0">
          <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="sa-navbar-profile__item sa-navbar-profile__item--danger" role="menuitem">
            <i data-lucide="log-out"></i>
            <span><strong>Logout</strong></span>
          </button>
        </form>
      </div>
    </div>
  </div>
</header>
</body>
</html>
