<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=9)}">
</head>
<body class="teacher-theme">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Teacher Panel</small></div>
        <nav>
            <a href="/teacher/dashboard">Dashboard</a>
            <a href="/teacher/attendance" class="active">Attendance</a>
            <a href="/teacher/marks">Marks</a>
            <a href="/teacher/timetable">Timetable</a>
            <a href="/teacher/reports">Reports</a>
            <a href="/teacher/trends">Trends</a>
            <a href="/logout" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div class="page-header">
            <h1>Attendance Management</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a href="/logout" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Select Subject &amp; Date</h3>
            <form method="get" th:action="@{/teacher/attendance}" id="attendanceFilterForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Subject</label>
                        <select name="subjectId" class="form-control" required onchange="this.form.submit()">
                            <option value="">-- Select Subject --</option>
                            <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectCode + ' - ' + s.subjectName}"
                                    th:selected="${selectedSubject != null and selectedSubject == s.id}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" th:value="${selectedDate}">
                    </div>
                    <div class="form-group" th:if="${selectedSubject != null}">
                        <label>Published Schedule Time</label>
                        <select name="timetableId" class="form-control" th:disabled="${#lists.isEmpty(availableSchedules)}">
                            <option value="" th:if="${#lists.isEmpty(availableSchedules)}">No published schedule for selected date</option>
                            <option th:each="tt : ${availableSchedules}"
                                    th:value="${tt.id}"
                                    th:text="${tt.startTime + ' - ' + tt.endTime + (tt.room != null ? ' (' + tt.room + ')' : '')}"
                                    th:selected="${selectedTimetableId != null and selectedTimetableId == tt.id}">
                            </option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Load</button>
                <button type="button"
                        th:if="${selectedSubject}"
                        class="btn btn-success"
                        style="margin-left:0.5rem;"
                        id="generateQrBtn"
                        th:disabled="${#lists.isEmpty(availableSchedules)}"
                        th:attr="data-subject-id=${selectedSubject}">
                    Generate QR Code
                </button>
            </form>
        </div>

        <div class="card" th:if="${enrollments}">
            <h3>Manual Attendance Entry</h3>
            <table>
                <thead><tr><th>Student No.</th><th>Name</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="e : ${enrollments}">
                        <td th:text="${e.student.studentNumber}"></td>
                        <td th:text="${e.student.fullName}"></td>
                        <td>
                            <span th:each="rec : ${attendanceRecords}" th:if="${rec.student.id == e.student.id}"
                                  th:class="'badge badge-' + ${#strings.toLowerCase(rec.status.name())}"
                                  th:text="${rec.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{/teacher/attendance/manual}" method="post" style="display:flex; gap:0.5rem;">
                                <input type="hidden" name="studentId" th:value="${e.student.id}">
                                <input type="hidden" name="subjectId" th:value="${selectedSubject}">
                                <select name="status" class="form-control" style="width:auto;">
                                    <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary">Mark</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script th:src="@{/js/profile-menu.js}"></script>
<script>
const qrBtn = document.getElementById('generateQrBtn');
if (qrBtn) {
    qrBtn.addEventListener('click', function () {
        const attendanceForm = document.getElementById('attendanceFilterForm');
        const subjectInput = attendanceForm ? attendanceForm.querySelector('select[name="subjectId"]') : null;
        const dateInput = attendanceForm ? attendanceForm.querySelector('input[name="date"]') : null;
        const timetableInput = attendanceForm ? attendanceForm.querySelector('select[name="timetableId"]') : null;
        const subjectId = subjectInput ? subjectInput.value : qrBtn.getAttribute('data-subject-id');
        const selectedDate = dateInput ? dateInput.value : '';
        const timetableId = timetableInput ? timetableInput.value : '';
        if (!subjectId) {
            alert('Please select a subject first.');
            return;
        }
        if (!timetableId) {
            if (window.amsShowStatus) {
                window.amsShowStatus('error', 'Please choose a published schedule time first.');
            } else {
                alert('Please choose a published schedule time first.');
            }
            return;
        }
        const doGenerate = function() {
            qrBtn.disabled = true;
            qrBtn.textContent = 'Getting location...';
            let targetUrl = '/teacher/attendance/qr?subjectId=' + encodeURIComponent(subjectId)
                + '&timetableId=' + encodeURIComponent(timetableId);
            if (selectedDate) {
                targetUrl += '&date=' + encodeURIComponent(selectedDate);
            }
            if (!navigator.geolocation) {
                window.location.href = targetUrl;
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    window.location.href = targetUrl
                        + '&latitude=' + pos.coords.latitude
                        + '&longitude=' + pos.coords.longitude;
                },
                function () {
                    if (window.amsShowStatus) {
                        window.amsShowStatus('error', 'Location access denied. QR will be generated without geo-validation.');
                    } else {
                        alert('Location access denied. QR will be generated without geo-validation.');
                    }
                    window.location.href = targetUrl;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        };
        if (window.amsConfirm) {
            window.amsConfirm('Generate QR attendance session? Your location will be captured for geo-validation.', {
                type: 'warning',
                title: 'Generate QR Session',
                okText: 'Generate QR'
            }).then(function(confirmed) {
                if (confirmed) doGenerate();
            });
        } else if (confirm('Generate QR attendance session? Your location will be captured for geo-validation.')) {
            doGenerate();
        }
    });
}
</script>
</body>
</html>
