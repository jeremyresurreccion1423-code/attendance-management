<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=8)}">
</head>
<body class="teacher-theme">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Teacher Panel</small></div>
        <nav>
            <a href="/teacher/dashboard">Dashboard</a>
            <a href="/teacher/attendance">Attendance</a>
            <a href="/teacher/marks">Marks</a>
            <a href="/teacher/timetable">Timetable</a>
            <a href="/teacher/reports" class="active">Reports</a>
            <a href="/teacher/trends">Trends</a>
            <a href="/logout" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h1>Reports</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a href="/logout" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div class="card">
            <h3>Export Attendance Report</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Start</label>
                    <input type="date" id="start" class="form-control"
                           th:value="${#temporals.format(#temporals.createToday().withDayOfMonth(1), 'yyyy-MM-dd')}">
                </div>
                <div class="form-group">
                    <label>End</label>
                    <input type="date" id="end" class="form-control"
                           th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                </div>
            </div>
            <a href="#" onclick="exportAtt('excel'); return false;" class="btn btn-success">Excel</a>
            <a href="#" onclick="exportAtt('pdf'); return false;" class="btn btn-danger" style="margin-left:0.5rem;">PDF</a>
        </div>
        <div class="card">
            <h3>Export Grades Report</h3>
            <div class="form-group">
                <label>Subject</label>
                <select id="gradeSubject" class="form-control">
                    <option value="">-- Select Subject --</option>
                    <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectCode + ' - ' + s.subjectName}"></option>
                </select>
            </div>
            <a href="#" onclick="exportGrades()" class="btn btn-success">Export Grades Excel</a>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/profile-menu.js}"></script>
<script>
function exportAtt(type) {
    const start = document.getElementById('start').value;
    const end = document.getElementById('end').value;
    if (!start || !end) {
        if (window.amsShowStatus) {
            window.amsShowStatus('error', 'Please select both start and end dates.');
        } else {
            alert('Please select both start and end dates.');
        }
        return;
    }
    if (end < start) {
        if (window.amsShowStatus) {
            window.amsShowStatus('error', 'End date must be on or after start date.');
        } else {
            alert('End date must be on or after start date.');
        }
        return;
    }
    window.location = '/teacher/reports/attendance/' + type + '?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end);
}
function exportGrades() {
    const subjectId = document.getElementById('gradeSubject').value;
    if (!subjectId) { alert('Please select a subject'); return; }
    window.location = '/teacher/reports/grades/excel?subjectId=' + subjectId;
}
</script>
</body>
</html>
