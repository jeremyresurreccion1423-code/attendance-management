<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marks - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=10)}">
</head>
<body class="teacher-theme">
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Teacher Panel</small></div>
        <nav>
            <a href="/teacher/dashboard">Dashboard</a>
            <a href="/teacher/attendance">Attendance</a>
            <a href="/teacher/marks" class="active">Marks</a>
            <a href="/teacher/timetable">Timetable</a>
            <a href="/teacher/reports">Reports</a>
            <a href="/teacher/trends">Trends</a>
            <a href="/logout" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="page-header">
            <h1>Marks Management</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <a href="/profile" class="profile-menu-action">My Profile</a>
                    <a href="/forgot-password" class="profile-menu-action">Forgot Password</a>
                    <a href="/logout" class="profile-menu-action profile-logout">Logout</a>
                </div>
            </div>
        </div>

        <div class="card">
            <form method="get" th:action="@{/teacher/marks}">
                <div class="form-group">
                    <label>Select Subject</label>
                    <select name="subjectId" class="form-control" onchange="this.form.submit()">
                        <option value="">-- Select --</option>
                        <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectCode + ' - ' + s.subjectName}"
                                th:selected="${selectedSubject != null and selectedSubject == s.id}"></option>
                    </select>
                </div>
            </form>
            <form th:if="${selectedSubject}" th:action="@{/teacher/marks/compute}" method="post" style="margin-top:1rem;">
                <input type="hidden" name="subjectId" th:value="${selectedSubject}">
                <button type="submit" class="btn btn-secondary">Compute All Final Grades</button>
            </form>
        </div>

        <div class="card" th:if="${enrollments}">
            <h3>Enter Scores (Quiz 20% | Assignment 30% | Exam 50%)</h3>
            <table>
                <thead><tr><th>Student</th><th>Quiz</th><th>Assignment</th><th>Exam</th><th>Final</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="e : ${enrollments}">
                        <td th:text="${e.student.fullName}"></td>
                        <td colspan="5">
                            <form th:action="@{/teacher/marks}" method="post" class="ams-validate confirm-action" data-confirm-message="Save marks for this student?" style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                                <input type="hidden" name="studentId" th:value="${e.student.id}">
                                <input type="hidden" name="subjectId" th:value="${selectedSubject}">
                                <input type="number" name="quizScore" class="form-control" style="width:80px;" min="0" max="100" step="0.01" placeholder="Quiz">
                                <input type="number" name="assignmentScore" class="form-control" style="width:80px;" min="0" max="100" step="0.01" placeholder="Assign">
                                <input type="number" name="examScore" class="form-control" style="width:80px;" min="0" max="100" step="0.01" placeholder="Exam">
                                <button type="submit" class="btn btn-sm btn-primary">Save</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${marks}" style="margin-top:1rem;">
                <h4>Current Grades</h4>
                <table>
                    <thead><tr><th>Student</th><th>Quiz</th><th>Assignment</th><th>Exam</th><th>Final</th></tr></thead>
                    <tbody>
                        <tr th:each="m : ${marks}">
                            <td th:text="${m.student.fullName}"></td>
                            <td th:text="${m.quizScore}"></td>
                            <td th:text="${m.assignmentScore}"></td>
                            <td th:text="${m.examScore}"></td>
                            <td th:text="${m.finalGrade}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script th:src="@{/js/profile-menu.js}"></script>
</body>
</html>
