<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Timetable - AMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<button type="button" class="sidebar-toggle-btn" data-sidebar-toggle aria-label="Toggle sidebar" aria-expanded="true">☰</button>
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h2>AMS</h2><small>Teacher Panel</small></div>
        <nav>
            <a href="/teacher/dashboard">Dashboard</a>
            <a href="/teacher/attendance">Attendance</a>
            <a href="/teacher/marks">Marks</a>
            <a href="/teacher/timetable" class="active">Timetable</a>
            <a href="/teacher/reports">Reports</a>
            <a href="/teacher/trends">Trends</a>
            <a href="/logout" style="margin-top:2rem; display:block;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="page-header">
            <h1>Timetable Management</h1>
            <div class="page-header-profile-widget">
                <button type="button" class="profile-trigger" onclick="toggleProfileMenu(this)">
                    <img th:if="${profilePhotoUrl != null}" class="profile-avatar profile-avatar-img" th:src="${profilePhotoUrl}" alt="Profile photo" />
                    <span th:unless="${profilePhotoUrl != null}" class="profile-avatar" th:text="${profileInitial ?: 'U'}">U</span>
                    <span class="profile-meta">
                        <strong>My Profile</strong>
                        <small th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</small>
                    </span>
                    <span class="profile-caret">▾</span>
                </button>
                <div class="profile-menu">
                    <button type="button" class="profile-menu-action" onclick="toggleProfilePanel('profile-panel')">My Profile</button>
                    <a href="/logout" class="profile-menu-action profile-logout">Logout</a>
                </div>
                <div class="profile-panel" id="profile-panel">
                    <div class="profile-panel-title">My Profile</div>
                    <div class="profile-summary">
                        <div class="profile-summary-avatar">
                            <img th:if="${profilePhotoUrl != null}" th:src="${profilePhotoUrl}" alt="Profile photo" />
                            <span th:unless="${profilePhotoUrl != null}" th:text="${profileInitial ?: 'U'}">U</span>
                        </div>
                        <div class="profile-summary-meta">
                            <strong th:text="${#authentication.name != null ? #authentication.name : 'User'}">user</strong>
                            <small th:text="${#authentication.authorities[0].authority}">ROLE_TEACHER</small>
                        </div>
                    </div>
                    <div class="profile-info">
                        <p><strong>Username:</strong> <span th:text="${#authentication.name}">user</span></p>
                        <p><strong>Role:</strong> <span th:text="${#authentication.authorities[0].authority}">ROLE_TEACHER</span></p>
                    </div>
                    <div class="profile-panel-section">
                        <div class="profile-panel-section-title">Upload Photo</div>
                        <form action="/profile/photo" method="post" enctype="multipart/form-data">
                            <div class="form-group"><input type="file" name="photo" accept="image/*" required></div>
                            <div class="profile-panel-actions"><button type="submit" class="btn btn-primary btn-sm">Upload</button></div>
                        </form>
                    </div>
                    <div class="profile-panel-section">
                        <div class="profile-panel-section-title">Change Password</div>
                        <form action="/profile/password" method="post">
                            <div class="form-group"><label>Current Password</label><input type="password" name="currentPassword" class="form-control" required></div>
                            <div class="form-group"><label>New Password</label><input type="password" name="newPassword" class="form-control" required></div>
                            <div class="form-group"><label>Confirm Password</label><input type="password" name="confirmPassword" class="form-control" required></div>
                            <div class="profile-panel-actions"><button type="submit" class="btn btn-primary btn-sm">Save</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Create Schedule</h3>
            <form th:action="@{/teacher/timetable}" method="post" th:object="${schedule}" class="ams-validate">
                <div class="form-row">
                    <div class="form-group">
                        <label>Subject</label>
                        <select th:field="*{subject.id}" class="form-control" required>
                            <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectName}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Day</label>
                        <select th:field="*{dayOfWeek}" class="form-control" required>
                            <option th:each="d : ${days}" th:value="${d}" th:text="${d}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" th:field="*{startTime}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" th:field="*{endTime}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Room</label>
                        <input type="text" th:field="*{room}" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Create Schedule</button>
            </form>
        </div>

        <div class="card">
            <h3>My Schedules</h3>
            <table>
                <thead><tr><th>Subject</th><th>Day</th><th>Time</th><th>Room</th><th>Published</th><th>Action</th></tr></thead>
                <tbody>
                    <th:block th:each="t : ${schedules}">
                        <tr>
                            <td th:text="${t.subject != null ? t.subject.subjectName : '-'}"></td>
                            <td th:text="${t.dayOfWeek}"></td>
                            <td th:text="${t.startTime != null and t.endTime != null ? t.startTime + ' - ' + t.endTime : '-'}"></td>
                            <td th:text="${t.room != null ? t.room : '-'}"></td>
                            <td th:text="${t.published ? 'Yes' : 'No'}"></td>
                            <td>
                                <form th:if="${!t.published}" th:action="@{/teacher/timetable/{id}/publish(id=${t.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-success">Publish</button>
                                </form>
                                <button type="button" class="btn btn-sm btn-secondary" th:onclick="'toggleEdit(' + ${t.id} + ')'">Edit</button>
                                <form th:action="@{/teacher/timetable/{id}/delete(id=${t.id})}" method="post" style="display:inline;" class="confirm-delete" data-confirm-message="Delete this schedule?">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${t.id}" style="display:none; background:#f8faf8;">
                            <td colspan="6">
                                <form th:action="@{/teacher/timetable/{id}/update(id=${t.id})}" method="post">
                                    <div class="form-row">
                                        <div class="form-group"><label>Day</label>
                                            <select name="dayOfWeek" class="form-control" required>
                                                <option th:each="d : ${days}" th:value="${d}" th:text="${d}" th:selected="${t.dayOfWeek == d}"></option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Start</label><input type="time" name="startTime" class="form-control" th:value="${t.startTime}" required></div>
                                        <div class="form-group"><label>End</label><input type="time" name="endTime" class="form-control" th:value="${t.endTime}" required></div>
                                        <div class="form-group"><label>Room</label><input type="text" name="room" class="form-control" th:value="${t.room}"></div>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                                    <button type="button" class="btn btn-secondary btn-sm" th:onclick="'toggleEdit(' + ${t.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                    </th:block>
                    <tr th:if="${#lists.isEmpty(schedules)}">
                        <td colspan="6" style="text-align:center; color:#666;">No schedules yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/layout.js}"></script>
<script>
function closeAllProfileMenus() {
    document.querySelectorAll('.profile-menu').forEach(menu => menu.classList.remove('show'));
    document.querySelectorAll('.profile-panel').forEach(panel => panel.classList.remove('show'));
}
function toggleProfileMenu(button) {
    const widget = button.closest('.page-header-profile-widget') || button.closest('.sidebar-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
}
function toggleProfilePanel(panelId) {
    closeAllProfileMenus();
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add('show');
}
document.addEventListener('click', function (event) {
    const target = event.target;
    if (!target.closest('.page-header-profile-widget') && !target.closest('.sidebar-profile-widget')) {
        closeAllProfileMenus();
    }
});
function toggleEdit(id) {
    const row = document.getElementById('edit-row-' + id);
    if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}
</script>
</body>
</html>
