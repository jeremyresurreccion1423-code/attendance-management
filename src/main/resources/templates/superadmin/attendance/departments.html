<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body th:replace="~{fragments/superadmin-page-shell :: shell('Departments — Attendance Control', 'Department Management', 'Create, edit, and view department details', ~{::content})}">
<th:block th:fragment="content">
<div class="sa-stats" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem;">
            <div class="card stat-card">
                <small>Total Departments</small>
                <strong th:text="${#lists.size(departments)}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Teachers</small>
                <strong th:text="${totalTeachers}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Students</small>
                <strong th:text="${totalStudents}">0</strong>
            </div>
            <div class="card stat-card">
                <small>Total Sections</small>
                <strong th:text="${totalSections}">0</strong>
            </div>
        </div>

        <div class="sa-card sa-glass">
            <h3>All Departments</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Teachers</th>
                        <th>Sections</th>
                        <th>Students</th>
                        <th>Subjects</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="d : ${departments}">
                    <tr>
                        <td th:text="${d.name}"></td>
                        <td th:text="${d.description != null ? d.description : '-'}"></td>
                        <td th:text="${d.teacherCount}"></td>
                        <td th:text="${d.sectionCount}"></td>
                        <td th:text="${d.studentCount}"></td>
                        <td th:text="${d.subjectCount}"></td>
                        <td>
                            <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${d.id} + ')'">Edit</button>
                            <form th:action="@{|/superadmin/attendance/departments/${d.id}/delete|}" method="post" style="display:inline;" class="confirm-delete"
                                  th:attr="data-confirm-message='Delete department ' + ${d.name} + '? This is only allowed when no records are linked.'">
                                <button type="submit" class="sa-btn sa-btn--danger sa-btn--sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:id="'edit-row-' + ${d.id}" style="display:none; background:#f8faf8;">
                        <td colspan="7">
                            <form th:action="@{|/superadmin/attendance/departments/${d.id}/update|}" method="post" class="ams-validate">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Name</label>
                                        <input type="text" name="name" class="form-control" th:value="${d.name}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Description</label>
                                        <input type="text" name="description" class="form-control" th:value="${d.description}">
                                    </div>
                                </div>
                                <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">Save</button>
                                <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${d.id} + ')'">Cancel</button>
                            </form>
                        </td>
                    </tr>
                    </th:block>
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="7" style="text-align:center; color:#666;">No departments yet. <a th:href="@{|/superadmin/attendance/create#department|}">Create one</a>.</td>
                    </tr>
                </tbody>
            </table>
        </div>

<script th:src="@{/js/forms.js}"></script>
</th:block>
</body>
</html>
