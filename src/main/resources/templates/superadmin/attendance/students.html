<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body th:replace="~{fragments/superadmin-page-shell :: shell('Students — Attendance Control', 'Student Management', 'Browse, filter, and manage student records', ~{::content})}">
<th:block th:fragment="content">
<div class="sa-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem;">
                    <h3 style="margin:0;">
                        <span th:if="${viewAll and selectedDepartmentId == null}">All Students</span>
                        <span th:if="${viewAll and selectedDepartmentId != null and (selectedYearLevel == null or selectedYearLevel.isEmpty())}">
                            Students - <span th:text="${selectedDepartmentName}"></span>
                        </span>
                        <span th:if="${selectedDepartmentId != null and selectedYearLevel != null and !selectedYearLevel.isEmpty()}">
                            Students - <span th:text="${selectedDepartmentName}"></span>
                            - <span th:text="${selectedYearLevel}"></span>
                            <span th:if="${selectedSectionId != null}"> - <span th:text="${selectedSectionName}"></span></span>
                            <span th:if="${viewAll and selectedSectionId == null}"> - All Sections</span>
                        </span>
                    </h3>
                    <a th:if="${selectedDepartmentId != null and selectedYearLevel != null and !selectedYearLevel.isEmpty()}"
                       th:href="@{/superadmin/attendance/students(departmentId=${selectedDepartmentId}, yearLevel=${selectedYearLevel})}"
                       class="sa-btn sa-btn--ghost">? Back to Sections</a>
                    <a th:if="${viewAll and selectedDepartmentId != null and (selectedYearLevel == null or selectedYearLevel.isEmpty())}"
                       th:href="@{/superadmin/attendance/students}"
                       class="sa-btn sa-btn--ghost">? Back to Departments</a>
                    <a th:if="${viewAll and selectedDepartmentId == null}"
                       th:href="@{/superadmin/attendance/students}"
                       class="sa-btn sa-btn--ghost">? Back to Departments</a>
                </div>

                <form method="get" th:action="@{/superadmin/attendance/students}" class="sa-filter-bar student-search-bar">
                    <input type="hidden" name="departmentId" th:if="${selectedDepartmentId != null}" th:value="${selectedDepartmentId}">
                    <input type="hidden" name="yearLevel" th:if="${selectedYearLevel != null}" th:value="${selectedYearLevel}">
                    <input type="hidden" name="sectionId" th:if="${selectedSectionId != null}" th:value="${selectedSectionId}">
                    <input type="hidden" name="viewAll" th:if="${viewAll}" value="true">
                    <input type="search" name="search" class="form-control" th:value="${searchQuery}"
                           placeholder="Search by name, student no., email, or department..." id="studentSearchInput">
                    <select name="status" class="form-control" id="studentStatusFilter">
                        <option value="">All Status</option>
                        <option value="ACTIVE" th:selected="${statusFilter == 'ACTIVE'}">ACTIVE</option>
                        <option value="INACTIVE" th:selected="${statusFilter == 'INACTIVE'}">INACTIVE</option>
                        <option value="ARCHIVED" th:selected="${statusFilter == 'ARCHIVED'}">ARCHIVED</option>
                    </select>
                    <button type="submit" class="sa-btn sa-btn--primary">Apply</button>
                    <a th:if="${searchQuery != null and !searchQuery.isEmpty() or statusFilter != null and !statusFilter.isEmpty()}"
                       th:href="@{/superadmin/attendance/students(departmentId=${selectedDepartmentId}, yearLevel=${selectedYearLevel}, sectionId=${selectedSectionId}, viewAll=${viewAll})}"
                       class="sa-btn sa-btn--ghost">Clear</a>
                </form>
            </div>

            <div class="sa-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Students <small id="studentCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <label for="studentPageSize">Rows</label>
                        <select id="studentPageSize" class="form-control">
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                </div>
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th data-sort="student-number">Student No.</th>
                            <th data-sort="name">Name</th>
                            <th data-sort="department">Department</th>
                            <th data-sort="year">Year</th>
                            <th data-sort="section">Section</th>
                            <th data-sort="status">Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="s : ${students}">
                        <tr class="student-row" data-admin-row
                            th:attr="data-status=${s.status}, data-search=${#strings.toLowerCase(s.fullName + ' ' + s.studentNumber + ' ' + (s.email != null ? s.email : '') + ' ' + (s.department != null ? s.department.name : ''))}, data-student-number=${s.studentNumber}, data-name=${s.fullName}, data-department=${s.department != null ? s.department.name : ''}, data-year=${s.yearLevel}, data-section=${s.section != null ? s.section.name : ''}">
                            <td th:text="${s.studentNumber}"></td>
                            <td th:text="${s.fullName}"></td>
                            <td th:text="${s.department != null ? s.department.name : '-'}"></td>
                            <td th:text="${s.yearLevel}"></td>
                            <td th:text="${s.section != null ? s.section.name : '-'}"></td>
                            <td th:text="${s.status}"></td>
                            <td>
                                <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Edit</button>
                                <form th:if="${s.status == null or s.status.name() != 'ARCHIVED'}"
                                      th:action="@{/superadmin/attendance/students/{id}/archive(id=${s.id})}" method="post" style="display:inline;" class="confirm-action" th:attr="data-confirm-message='Archive student ' + ${s.fullName} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <input type="hidden" name="returnSectionId" th:if="${selectedSectionId != null}" th:value="${selectedSectionId}">
                                    <input type="hidden" name="returnViewAll" th:if="${viewAll}" value="true">
                                    <input type="hidden" name="returnSearch" th:value="${searchQuery}">
                                    <button type="submit" class="btn btn-success btn-sm">Archive</button>
                                </form>
                                <form th:if="${s.status != null and s.status.name() == 'ARCHIVED'}"
                                      th:action="@{/superadmin/attendance/students/{id}/unarchive(id=${s.id})}" method="post" style="display:inline;" class="confirm-action" th:attr="data-confirm-message='Unarchive student ' + ${s.fullName} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <input type="hidden" name="returnSectionId" th:if="${selectedSectionId != null}" th:value="${selectedSectionId}">
                                    <input type="hidden" name="returnViewAll" th:if="${viewAll}" value="true">
                                    <input type="hidden" name="returnSearch" th:value="${searchQuery}">
                                    <button type="submit" class="btn btn-light btn-sm">Unarchive</button>
                                </form>
                                <form th:action="@{/superadmin/attendance/students/{id}/delete(id=${s.id})}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete student ' + ${s.fullName} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <input type="hidden" name="returnSectionId" th:if="${selectedSectionId != null}" th:value="${selectedSectionId}">
                                    <input type="hidden" name="returnViewAll" th:if="${viewAll}" value="true">
                                    <input type="hidden" name="returnSearch" th:value="${searchQuery}">
                                    <button type="submit" class="sa-btn sa-btn--danger sa-btn--sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${s.id}" style="display:none; background:#f8faf8;">
                            <td colspan="7">
                                <form th:action="@{/superadmin/attendance/students/{id}/update(id=${s.id})}" method="post" class="ams-validate" th:attr="data-lookup-form='true', id='edit-student-form-' + ${s.id}">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <input type="hidden" name="returnSectionId" th:if="${selectedSectionId != null}" th:value="${selectedSectionId}">
                                    <input type="hidden" name="returnViewAll" th:if="${viewAll}" value="true">
                                    <input type="hidden" name="returnSearch" th:value="${searchQuery}">
                                    <div class="form-row">
                                        <div class="form-group"><label>Name</label><input type="text" name="fullName" class="form-control" th:value="${s.fullName}" required></div>
                                        <div class="form-group"><label>Department</label>
                                            <select name="department.id" class="form-control" data-lookup-role="department" required th:attr="data-selected=${s.department != null ? s.department.id : ''}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Year</label>
                                            <select name="yearLevel" class="form-control" data-lookup-role="year-level" required th:attr="data-selected=${s.yearLevel}">
                                                <option value="">-- Select department first --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Section</label>
                                            <select name="section.id" class="form-control" data-lookup-role="section" required th:attr="data-selected=${s.section != null ? s.section.id : ''}">
                                                <option value="">-- Select department &amp; year first --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Contact</label><input type="text" name="contactNumber" class="form-control" th:value="${s.contactNumber}" inputmode="numeric" pattern="[0-9]*"></div>
                                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" th:value="${s.email}" required pattern="[\w.+-]+@gmail\.com" title="Only Gmail addresses are allowed (example@gmail.com)"></div>
                                        <div class="form-group"><label>Status</label>
                                            <select name="status" class="form-control" required>
                                                <option value="">-- Select Status --</option>
                                                <option value="ACTIVE" th:selected="${s.status != null and s.status.name() == 'ACTIVE'}">ACTIVE</option>
                                                <option value="INACTIVE" th:selected="${s.status != null and s.status.name() == 'INACTIVE'}">INACTIVE</option>
                                                <option value="ARCHIVED" th:selected="${s.status != null and s.status.name() == 'ARCHIVED'}">ARCHIVED</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">Save</button>
                                    <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="7" style="text-align:center; color:#666;">No students found.</td>
                        </tr>
                    </tbody>
                </table>
                <div id="studentPagination" class="admin-pagination"></div>
            </div>
        </div>

<script th:src="@{/js/forms.js}"></script>
</th:block>
</body>
</html>
