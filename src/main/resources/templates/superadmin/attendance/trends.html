<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Trends ? Attendance Control', 'Attendance Trends', 'Weekly and monthly attendance analytics', ~{::content})}">
<th:block th:fragment="content">

  <div class="sa-stats">
    <article class="sa-stat">
      <div class="sa-stat__head">
        <div class="sa-stat__icon sa-stat__icon--emerald"><i class="bi bi-calendar-day"></i></div>
      </div>
      <div class="sa-stat__label">Today's Records</div>
      <div class="sa-stat__value" th:text="${data.todayAttendance}">0</div>
    </article>
    <article class="sa-stat">
      <div class="sa-stat__head">
        <div class="sa-stat__icon sa-stat__icon--sky"><i class="bi bi-calendar-week"></i></div>
      </div>
      <div class="sa-stat__label">Weekly Records</div>
      <div class="sa-stat__value" th:text="${data.weeklyAttendance}">0</div>
    </article>
    <article class="sa-stat">
      <div class="sa-stat__head">
        <div class="sa-stat__icon"><i class="bi bi-calendar3"></i></div>
      </div>
      <div class="sa-stat__label">Monthly Records</div>
      <div class="sa-stat__value" th:text="${data.monthlyAttendance}">0</div>
    </article>
    <article class="sa-stat">
      <div class="sa-stat__head">
        <div class="sa-stat__icon sa-stat__icon--amber"><i class="bi bi-people"></i></div>
      </div>
      <div class="sa-stat__label">Total Students</div>
      <div class="sa-stat__value" th:text="${data.totalStudents}">0</div>
    </article>
  </div>

  <div class="sa-portal-row">
    <section class="sa-panel">
      <div class="sa-card__head"><h2>Weekly Attendance Trend</h2></div>
      <div class="sa-chart-wrap trends-page-chart"><canvas id="weeklyTrendChart"></canvas></div>
    </section>
    <section class="sa-panel">
      <div class="sa-card__head"><h2>Monthly Attendance Trend</h2></div>
      <div class="sa-chart-wrap trends-page-chart"><canvas id="monthlyTrendChart"></canvas></div>
    </section>
  </div>

  <section class="sa-panel" th:if="${!#lists.isEmpty(data.lowAttendanceAlerts)}">
    <div class="sa-card__head"><h2>Low Attendance Alerts (&lt; 75%)</h2></div>
    <div class="sa-table-wrap">
      <table class="sa-table">
        <thead><tr><th>Student No.</th><th>Name</th><th>Attendance %</th></tr></thead>
        <tbody>
          <tr th:each="alert : ${data.lowAttendanceAlerts}">
            <td th:text="${alert.studentNumber}"></td>
            <td th:text="${alert.studentName}"></td>
            <td th:text="${alert.percentage} + '%'"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script th:src="@{/js/vendor/chart.umd.min.js}"></script>
  <script th:src="@{/js/dashboard-charts.js(v=5)}"></script>
  <script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', function () {
    DashboardCharts.renderAttendanceTrend('weeklyTrendChart', /*[[${data.dailyTrendChart}]]*/ {});
    DashboardCharts.renderAttendanceTrend('monthlyTrendChart', /*[[${data.monthlyTrendChart}]]*/ {});
  });
  </script>
</th:block>
</body>
</html>
