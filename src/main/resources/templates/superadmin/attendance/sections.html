<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Sections — Attendance Control', 'Section Management', 'Organize sections by department and year level', ~{::content})}">
<th:block th:fragment="content">
        <div th:if="${selectedDepartmentId == null}">
            <div class="sa-panel">
                <h3>Select Department</h3>
                <div class="course-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                    <a th:each="d : ${departmentList}" th:href="@{|/superadmin/attendance/sections?departmentId=${d.id}|}" class="course-card">
                        <h4 th:text="${d.name}"></h4>
                        <p>Click to view sections</p>
                    </a>
                    <div th:if="${#lists.isEmpty(departmentList)}" style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #666;">
                        <p>No departments found.</p>
                    </div>
                </div>
            </div>

            <div class="sa-panel" th:if="${!#lists.isEmpty(sections)}">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Sections <small id="sectionCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <input type="search" id="sectionSearchInput" class="form-control" placeholder="Search sections...">
                    <select id="sectionPageSize" class="form-control"><option value="10">10</option><option value="25">25</option></select>
                </div>
                <table id="sectionsTable">
                    <thead><tr><th data-sort="name">Name</th><th data-sort="department">Department</th><th data-sort="year">Year Level</th><th>Action</th></tr></thead>
                    <tbody>
                        <th:block th:each="s : ${sections}">
                        <tr data-admin-row th:attr="data-search=${#strings.toLowerCase(s.name + ' ' + (s.department != null ? s.department.name : '') + ' ' + s.yearLevel)}, data-name=${s.name}, data-department=${s.department != null ? s.department.name : ''}, data-year=${s.yearLevel}">
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.department != null ? s.department.name : '-'}"></td>
                            <td th:text="${s.yearLevel}"></td>
                            <td>
                                <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Edit</button>
                                <form th:action="@{|/superadmin/attendance/sections/${s.id}/delete|}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete section ' + ${s.name} + '?'">
                                    <button type="submit" class="sa-btn sa-btn--danger sa-btn--sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${s.id}" style="display:none; background:#f8faf8;">
                            <td colspan="4">
                                <form th:action="@{|/superadmin/attendance/sections/${s.id}/update|}" method="post" class="ams-validate" data-lookup-form>
                                    <div class="form-row">
                                        <div class="form-group"><label>Section Name</label><input type="text" name="name" class="form-control" th:value="${s.name}" required></div>
                                        <div class="form-group"><label>Department</label>
                                            <select name="department.id" class="form-control" data-lookup-role="department" required th:attr="data-selected=${s.department != null ? s.department.id : ''}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Year Level</label>
                                            <select name="yearLevel" class="form-control" data-lookup-role="year-level" required th:attr="data-selected=${s.yearLevel}">
                                                <option value="">-- Select department first --</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">Save</button>
                                    <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                    </tbody>
                </table>
                <div id="sectionPagination" class="admin-pagination"></div>
            </div>
        </div>

        <div th:if="${selectedDepartmentId != null}">
            <div class="sa-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap;">
                    <h3 style="margin:0;">
                        Sections - <span th:text="${selectedDepartmentName}"></span>
                        <span th:if="${selectedYearLevel != null and !selectedYearLevel.isEmpty()}"> - <span th:text="${selectedYearLevel}"></span></span>
                    </h3>
                    <a th:href="@{|/superadmin/attendance/sections|}" class="sa-btn sa-btn--ghost">? Back to Departments</a>
                </div>
                <div class="year-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem;">
                    <a th:href="@{/superadmin/attendance/sections(departmentId=${selectedDepartmentId})}"
                       class="year-card"
                       th:style="${selectedYearLevel == null or selectedYearLevel.isEmpty()} ? 'outline: 2px solid var(--primary, #2563eb);' : ''">
                        <h4>All Years</h4>
                    </a>
                    <a th:each="yl : ${yearLevels}"
                       th:href="@{/superadmin/attendance/sections(departmentId=${selectedDepartmentId}, yearLevel=${yl})}"
                       class="year-card"
                       th:style="${selectedYearLevel != null and selectedYearLevel.equals(yl)} ? 'outline: 2px solid var(--primary, #2563eb);' : ''">
                        <h4 th:text="${yl}"></h4>
                    </a>
                </div>
            </div>

            <div class="sa-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
                    <h3 style="margin:0;">All Sections <small id="sectionCountLabel" style="font-weight:normal; color:#64748b;"></small></h3>
                    <input type="search" id="sectionSearchInput" class="form-control" placeholder="Search sections...">
                    <select id="sectionPageSize" class="form-control"><option value="10">10</option><option value="25">25</option></select>
                </div>
                <table id="sectionsTable">
                    <thead><tr><th data-sort="name">Name</th><th data-sort="department">Department</th><th data-sort="year">Year Level</th><th>Action</th></tr></thead>
                    <tbody>
                        <th:block th:each="s : ${sections}">
                        <tr data-admin-row th:attr="data-search=${#strings.toLowerCase(s.name + ' ' + (s.department != null ? s.department.name : '') + ' ' + s.yearLevel)}, data-name=${s.name}, data-department=${s.department != null ? s.department.name : ''}, data-year=${s.yearLevel}">
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.department != null ? s.department.name : '-'}"></td>
                            <td th:text="${s.yearLevel}"></td>
                            <td>
                                <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Edit</button>
                                <form th:action="@{|/superadmin/attendance/sections/${s.id}/delete|}" method="post" style="display:inline;" class="confirm-delete" th:attr="data-confirm-message='Delete section ' + ${s.name} + '?'">
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <button type="submit" class="sa-btn sa-btn--danger sa-btn--sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:id="'edit-row-' + ${s.id}" style="display:none; background:#f8faf8;">
                            <td colspan="4">
                                <form th:action="@{|/superadmin/attendance/sections/${s.id}/update|}" method="post" class="ams-validate" data-lookup-form>
                                    <input type="hidden" name="returnDepartmentId" th:value="${selectedDepartmentId}">
                                    <input type="hidden" name="returnYearLevel" th:value="${selectedYearLevel}">
                                    <div class="form-row">
                                        <div class="form-group"><label>Section Name</label><input type="text" name="name" class="form-control" th:value="${s.name}" required></div>
                                        <div class="form-group"><label>Department</label>
                                            <select name="department.id" class="form-control" data-lookup-role="department" required th:attr="data-selected=${s.department != null ? s.department.id : selectedDepartmentId}">
                                                <option value="">-- Loading --</option>
                                            </select>
                                        </div>
                                        <div class="form-group"><label>Year Level</label>
                                            <select name="yearLevel" class="form-control" data-lookup-role="year-level" required th:attr="data-selected=${s.yearLevel}">
                                                <option value="">-- Select department first --</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">Save</button>
                                    <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" th:onclick="'toggleEdit(' + ${s.id} + ')'">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(sections)}">
                            <td colspan="4" style="text-align:center; color:#666;">No sections yet for this department<span th:if="${selectedYearLevel != null and !selectedYearLevel.isEmpty()}"> and year level</span>.</td>
                        </tr>
                    </tbody>
                </table>
                <div id="sectionPagination" class="admin-pagination"></div>
            </div>
        </div>

<script th:src="@{/js/forms.js}"></script>
<script th:src="@{/js/lookup-filter.js(v=3)}"></script>
<script th:src="@{/js/admin-list.js(v=1)}"></script>
<script th:src="@{/js/superadmin-attendance-pages.js(v=1)}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    initAdminTable(document.getElementById('sectionsTable'), {
        searchInput: document.getElementById('sectionSearchInput'),
        pageSizeSelect: document.getElementById('sectionPageSize'),
        paginationEl: document.getElementById('sectionPagination'),
        countEl: document.getElementById('sectionCountLabel'),
    });
});
</script>
</th:block>
</body>
</html>
