<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Reports ? Attendance Control', 'Reports', 'Export attendance and student reports', ~{::content})}">
<th:block th:fragment="content">

  <div class="sa-grid-2">
    <section class="sa-panel">
      <div class="sa-card__head"><h2>Attendance Report</h2></div>
      <form class="form-row">
        <div class="form-group">
          <label for="startDate">Start Date</label>
          <input type="date" id="startDate" class="form-control" th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
        </div>
        <div class="form-group">
          <label for="endDate">End Date</label>
          <input type="date" id="endDate" class="form-control" th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
        </div>
      </form>
      <div class="sa-form-actions">
        <a href="#" onclick="exportReport('excel'); return false;" class="sa-btn sa-btn--success">
          <i class="bi bi-file-earmark-spreadsheet"></i> Export Excel
        </a>
        <a href="#" onclick="exportReport('pdf'); return false;" class="sa-btn sa-btn--danger">
          <i class="bi bi-file-earmark-pdf"></i> Export PDF
        </a>
      </div>
    </section>

    <section class="sa-panel">
      <div class="sa-card__head"><h2>Student Report</h2></div>
      <p class="sa-lead">Download a complete PDF list of all registered students.</p>
      <a th:href="@{/superadmin/attendance/reports/students/pdf}" class="sa-btn sa-btn--danger">
        <i class="bi bi-file-earmark-pdf"></i> Export Student List (PDF)
      </a>
    </section>
  </div>

  <script th:inline="javascript">
  function exportReport(type) {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const base = /*[[@{|/superadmin/attendance/reports/attendance/|}]]*/ '/superadmin/attendance/reports/attendance/';
    window.location = base + type + '?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end);
  }
  </script>
</th:block>
</body>
</html>
